name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build & Publish
        run: dotnet publish --configuration Release --output C:\publish_temp

      - name: Copy files without overwriting appsettings
        shell: powershell
        run: |
          robocopy C:\publish_temp C:\site /E /XF appsettings.json appsettings.Production.json
          if ($LASTEXITCODE -le 7) { exit 0 }
